<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Katalog & Admin Futuristik Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* === Variabel Tema Futuristik & Modern === */
        :root {
            /* Light Mode */
            --bg-color: #f0f4f8; 
            --text-color: #0f172a;
            --header-bg: rgba(255, 255, 255, 0.75);
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(15, 23, 42, 0.08);
            --primary-color: #2563eb; 
            --primary-hover: #1d4ed8;
            --glow-color: rgba(37, 99, 235, 0.25);
            --card-shadow: 0 10px 30px -10px rgba(0,0,0,0.08);
            --danger-color: #dc2626;
            --danger-hover: #b91c1c;
            --success-color: #16a34a;
        }

        .dark-mode {
            /* Dark Mode */
            --bg-color: #09090e; 
            --text-color: #f8fafc;
            --header-bg: rgba(9, 9, 14, 0.8);
            --card-bg: rgba(20, 20, 28, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-color: #00f0ff; 
            --primary-hover: #00c3cc;
            --glow-color: rgba(0, 240, 255, 0.35);
            --card-shadow: 0 10px 30px -10px rgba(0, 240, 255, 0.1);
            --danger-color: #ff4a4a;
            --danger-hover: #e03333;
            --success-color: #00ff66;
        }

        /* === Reset & Base === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            transition: background-color 0.5s ease, color 0.5s ease; 
            padding-bottom: 140px; 
            background-image: radial-gradient(circle at top right, var(--glow-color) 0%, transparent 40%);
            background-attachment: fixed;
        }
        
        /* === Header & Navigasi === */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background-color: var(--header-bg); 
            border-bottom: 1px solid var(--border-color); 
            position: sticky; top: 0; z-index: 100; 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }
        
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo img { max-height: 50px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); transition: all 0.3s ease; }
        .logo img:hover { transform: scale(1.05); }
        .store-name { font-size: 1.5rem; font-weight: 800; letter-spacing: 0.5px; background: linear-gradient(45deg, var(--primary-color), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-controls { display: flex; gap: 12px; }
        button { 
            cursor: pointer; padding: 10px 20px; border: none; border-radius: 12px; 
            font-weight: 700; font-size: 0.95rem; background-color: var(--primary-color); 
            color: #fff; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 15px var(--glow-color);
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 25px var(--glow-color); }
        
        .icon-btn { font-size: 1.2rem; background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 14px; box-shadow: none; backdrop-filter: blur(8px); }
        .icon-btn:hover { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* === Teks Berjalan (Marquee) === */
        .marquee-wrapper {
            background: linear-gradient(90deg, var(--primary-color), var(--primary-hover));
            color: #fff;
            padding: 8px 0;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 99;
            box-shadow: 0 2px 10px var(--glow-color);
        }
        .marquee-text {
            white-space: nowrap;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            animation: scrollText 20s linear infinite;
            display: inline-block;
            padding-left: 100vw; 
        }
        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* === Banner Slide 3:1 === */
        .banner-wrapper { width: 100%; aspect-ratio: 3 / 1; overflow: hidden; position: relative; background: #000; border-bottom: 1px solid var(--border-color); }
        .banner-track { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .banner-track img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; filter: brightness(0.9); }

        /* === Layout Konten & Manajemen Halaman SPA === */
        .container { padding: 40px 5%; max-width: 1200px; margin: auto; }
        .view-section { display: none; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        .view-section.active { display: block; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* Style Box Halaman Sub-Menu Tambahan Navigasi */
        .page-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 40px 20px; border-radius: 24px; text-align: center;
            box-shadow: var(--card-shadow); backdrop-filter: blur(10px);
            max-width: 600px; margin: 0 auto;
        }

        /* === Admin Panel === */
        .admin-form { 
            background: var(--card-bg); padding: 30px; border-radius: 20px; 
            border: 1px solid var(--border-color); box-shadow: var(--card-shadow); 
            max-width: 550px; margin: 0 auto 30px; backdrop-filter: blur(12px);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.95rem; color: var(--text-color); }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 14px 16px; border: 2px solid var(--border-color); 
            border-radius: 12px; background: rgba(0,0,0,0.02); color: var(--text-color); 
            font-size: 1rem; transition: all 0.3s ease; 
        }
        .dark-mode .form-group input, .dark-mode .form-group textarea { background: rgba(255,255,255,0.02); }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary-color); background: transparent; box-shadow: 0 0 0 4px var(--glow-color); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .image-preview { 
            width: 100%; height: 180px; border: 2px dashed var(--border-color); margin-top: 12px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
            border-radius: 12px; background: rgba(0,0,0,0.01); transition: all 0.3s ease;
        }
        .image-preview:hover { border-color: var(--primary-color); }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Daftar Management Layanan di Admin */
        .admin-product-list { max-width: 800px; margin: 40px auto 0; }
        .admin-table-wrapper { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; box-shadow: var(--card-shadow); }
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        .admin-table th, .admin-table td { padding: 15px 20px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        .admin-table th { background: rgba(0,0,0,0.02); font-weight: 700; }
        .dark-mode .admin-table th { background: rgba(255,255,255,0.02); }
        .admin-table img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); }
        
        .btn-edit { background-color: var(--success-color); box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2); margin-right: 5px; padding: 6px 12px; font-size: 0.85rem; border-radius: 8px; }
        .btn-edit:hover { background-color: #15803d; }
        .btn-delete { background-color: var(--danger-color); box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2); padding: 6px 12px; font-size: 0.85rem; border-radius: 8px; }
        .btn-delete:hover { background-color: var(--danger-hover); }

        /* === Preview & Etalase === */
        .search-bar { 
            width: 100%; padding: 16px 20px; border: 2px solid var(--border-color); 
            border-radius: 16px; background: var(--card-bg); color: var(--text-color); 
            margin-bottom: 40px; font-size: 1.1rem; box-shadow: var(--card-shadow); 
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .search-bar:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 20px var(--glow-color); transform: translateY(-2px); }
        
        .product-grid { 
            display: grid !important; 
            grid-template-columns: repeat(3, 1fr) !important; 
            gap: 30px; 
            width: 100%;
        }

        .product-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: var(--card-shadow); backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .product-card:hover { 
            transform: translateY(-8px) scale(1.01); 
            box-shadow: 0 20px 40px var(--glow-color); 
            border-color: var(--primary-color); 
        }
        .product-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        
        .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .product-title { 
            font-size: 1.15rem; font-weight: 700; line-height: 1.3; color: var(--text-color);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; 
            overflow: hidden; min-height: 2.6rem; 
        }
        
        .product-price { 
            font-weight: 800; color: var(--primary-color); 
            text-shadow: 0 2px 10px var(--glow-color); margin-bottom: 6px; 
            text-align: center; 
            white-space: nowrap; 
            width: 100%;
            transition: font-size 0.3s ease;
        }

        .action-btn {
            width: 100%; padding: 11px; font-size: 0.95rem; font-weight: 700; border-radius: 12px;
            background-color: var(--primary-color); color: #fff; border: none; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 12px var(--glow-color); text-align: center;
            margin-top: auto; 
        }
        .action-btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); }

        /* === 5 NAVIGASI UTAMA (BOTTOM NAVIGATION BAR) === */
        .bottom-nav {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 500px; height: 65px;
            background-color: var(--header-bg); border: 1px solid var(--border-color);
            border-radius: 20px; z-index: 150; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow), 0 10px 30px rgba(0,0,0,0.05);
            display: flex; justify-content: space-around; align-items: center; padding: 0 10px;
            transition: bottom 0.3s ease;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-color); opacity: 0.5; text-decoration: none; cursor: pointer;
            width: 60px; height: 100%; border-radius: 12px; transition: all 0.3s ease; gap: 3px;
        }
        .nav-item .nav-icon { font-size: 1.3rem; transition: transform 0.3s ease; }
        .nav-item .nav-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        
        .nav-item.active { opacity: 1; color: var(--primary-color); }
        .nav-item.active .nav-icon { transform: scale(1.15) translateY(-2px); text-shadow: 0 0 10px var(--glow-color); }

        /* === Lightbox Modals === */
        .img-lightbox {
            display: none; position: fixed; z-index: 210; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            justify-content: center; align-items: center; animation: fadeIn 0.2s ease;
        }
        .img-lightbox img { max-width: 90%; max-height: 85%; object-fit: contain; border-radius: 16px; box-shadow: 0 0 30px rgba(255,255,255,0.1); }

        .lightbox {
            display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            justify-content: center; align-items: center; animation: fadeIn 0.3s ease; padding: 20px;
        }
        .lightbox-content {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 25px; border-radius: 24px; max-width: 460px; width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative;
            animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(20px);
        }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .lightbox-content img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .lightbox-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; color: var(--text-color); }
        .lightbox-desc { font-size: 0.95rem; opacity: 0.8; margin-bottom: 20px; line-height: 1.5; color: var(--text-color); max-height: 120px; overflow-y: auto; padding-right: 5px; }
        .lightbox-price { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); text-shadow: 0 2px 10px var(--glow-color); white-space: nowrap; }
        
        .lightbox-close { position: absolute; top: 12px; right: 20px; color: var(--text-color); font-size: 32px; font-weight: bold; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .lightbox-close:hover { opacity: 1; color: var(--primary-color); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .lightbox-desc::-webkit-scrollbar { width: 5px; }
        .lightbox-desc::-webkit-scrollbar-track { background: transparent; }
        .lightbox-desc::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* === Footer === */
        footer { 
            text-align: center; padding: 15px; background: var(--header-bg); 
            border-top: 1px solid var(--border-color); position: fixed; bottom: 0; 
            width: 100%; font-size: 0.85rem; font-weight: 600; 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img id="header-logo" src="" alt="Logo">
            <span id="header-store-name" class="store-name"></span>
        </div>
        <div class="nav-controls">
            <button id="theme-toggle" class="icon-btn" title="Ganti Tema">🌙</button>
            <button id="view-toggle" class="icon-btn" title="Ganti Tampilan">⚙️</button>
        </div>
    </header>

    <div class="marquee-wrapper">
        <div class="marquee-text" id="marquee-el"></div>
    </div>

    <div class="banner-wrapper">
        <div class="banner-track" id="banner-track"></div>
    </div>

    <div class="container">
        
        <main id="admin-view" class="view-section active">
            <h2 id="admin-title" style="text-align: center; margin-bottom: 30px; font-weight: 800; font-size: 2rem;">Input Layanan Baru</h2>
            <div class="admin-form">
                <form id="product-form">
                    <div class="form-group">
                        <label>Nama Produk</label>
                        <input type="text" id="input-name" required placeholder="Masukkan nama produk...">
                    </div>
                    <div class="form-group">
                        <label>Deskripsi Produk</label>
                        <textarea id="input-desc" required placeholder="Ketik detail dan keunggulan layanan di sini..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Harga Layanan (Rp)</label>
                        <input type="number" id="input-price" required placeholder="Contoh: 50000">
                    </div>
                    <div class="form-group">
                        <label>Foto Visual (Lokal)</label>
                        <input type="file" id="input-image" accept="image/*" style="padding: 10px; border: none; background: transparent;">
                        <div class="image-preview" id="img-preview-container">
                            <span id="img-placeholder" style="opacity:0.5; font-weight:600;">Pilih Gambar untuk Preview</span>
                            <img id="img-preview-el" src="" alt="Preview">
                        </div>
                    </div>
                    <button type="submit" id="btn-submit-form" style="width: 100%; padding: 16px; font-size: 1.1rem; border-radius: 12px;">Simpan ke Katalog</button>
                </form>
            </div>

            <div class="admin-product-list">
                <h3 style="margin-bottom: 15px; font-weight: 800; font-size: 1.4rem;">📦 Daftar Manajemen Produk</h3>
                <div class="admin-table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Visual</th>
                                <th>Nama Layanan</th>
                                <th>Harga (Gross)</th>
                                <th style="text-align: center;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <div id="preview-view" class="view-section">
            <section id="page-home" class="nav-page">
                <input type="text" id="search-bar" class="search-bar" placeholder="🔍 Cari nama layanan...">
                <div class="product-grid" id="product-grid"></div>
            </section>
        </div>
    </div>

    <nav class="bottom-nav" id="main-bottom-nav" style="display: none;">
        <div class="nav-item active" onclick="switchPage('home')"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></div>
        <div class="nav-item" onclick="switchPage('promo')"><span class="nav-icon">🎁</span><span class="nav-label">Promo</span></div>
        <div class="nav-item" onclick="switchPage('topup')"><span class="nav-icon">⚡</span><span class="nav-label">
